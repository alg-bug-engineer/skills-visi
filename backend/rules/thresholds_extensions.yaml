# Backend-specific thresholds (merged on load with checklist真源)
# See intersection_agent/utils/thresholds_loader.py

chronic:
  min_congested_days: 4
  window_days: 7
  dow_hit_rate_high: 0.75

constraint:
  spillback_margin: 0.05
  queue_growth_margin: 0.10
  saturation_margin: 0.10

imbalance:
  # 转向饱和度极差（spread）分界：≥ 视为"绿灯分配不均、配时可优化"，< 视为"分布均匀"。
  # 主诊断（供需匹配度叙事主轴）专用，可独立于 imbalance.diagnosis 调参。
  spread_balanced: 0.30

corridor:
  coord_stop_times_high: 1.5
  line_delay_index_high: 1.5

external:
  complaint_count_high: 5
  complaint_count_demo: 1

approach:
  stop_time_high_sec: 60
  stop_times_high: 1.5

timing:
  green_deficit_ratio: 0.10
  flow_green_tau_weak: 0.5

green:
  green_ratio_low: 0.35

display:
  saturation_cap: 1.5

flow_trace:
  # 上游来源路径途经率（flow_share_ratio，0-300+，非占比）判定阈值。
  # 语义：本进口约 X% 车流"途经过"该上游转向；同方位多跳衰减，一跳取最大。
  # coverage_high：单一上游主导的途经率下限（百分数口径，70 = 70%）。
  coverage_high: 70.0
  # dominance_gap：主导方位与次方位途经率绝对差下限，判定"单一上游主导"。
  gap_significant: 25.0
  # 仅对饱和度 ≥ trigger_saturation 的转向做溯源（与 saturation.oversaturation 对齐）。
  trigger_saturation: 0.90
  # 单转向展示的一跳来源数上限。
  top_sources: 3

upstream_trace:
  # 进口道过饱和触发溯源的下限（与 flow_trace.trigger_saturation 对齐）。
  trigger_saturation: 0.90
  # 判定"该进口道全饱和、无本地信控空间"的单进口道饱和度下限。
  full_saturation: 0.85
  # 进口道绿灯利用率低于此值视为"绿灯空槽"，存在可调空间。
  governable_green_util: 0.50
  # 递归上溯最大跳数。
  max_hops: 2
