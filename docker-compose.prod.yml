# [备选] Docker Compose 生产部署 — 默认请使用原生方式：bash scripts/prod-start.sh
#
# 原生部署（推荐）：
#   cp backend/.env.example backend/.env
#   bash scripts/prod-start.sh
#
# Docker 备选：
#   docker compose -f docker-compose.prod.yml up -d --build

name: intersection-agent

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    env_file:
      - backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8011
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    expose:
      - "8011"
    restart: unless-stopped
    volumes:
      - skill-data:/app/data/skills
      - log-data:/app/data/logs

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  skill-data:
  log-data:
