# 宿主机 Nginx — ECS 原生部署（公网 IP + 端口，HTTP 非 HTTPS）
# 由 scripts/prod-start.sh 渲染：__DEPLOY_ROOT__ __HTTP_PORT__ __BACKEND_PORT__
# 访问示例：http://8.149.232.39:5568/  （不要用 https）

server {
    listen __HTTP_PORT__ default_server;
    listen [::]:__HTTP_PORT__ default_server;
    server_name _;

    root __DEPLOY_ROOT__/frontend-v2/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location /api/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
