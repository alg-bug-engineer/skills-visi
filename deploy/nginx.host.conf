# 宿主机 Nginx 配置 — ECS 原生部署（默认非 80 端口）
# 由 scripts/prod-start.sh 渲染：__DEPLOY_ROOT__ __HTTP_PORT__ __BACKEND_PORT__

server {
    listen __HTTP_PORT__;
    server_name _;

    root __DEPLOY_ROOT__/frontend-v2/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location /api/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
